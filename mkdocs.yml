# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: sapling
site_description: simple persistence for pydantic models
site_url: https://github.com/thejchap/sapling
repo_url: https://github.com/thejchap/sapling
repo_name: thejchap/sapling

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-7
        name: switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: light-green
      toggle:
        icon: material/brightness-4
        name: switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_if_no_docstring: false
            members_order: source
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

nav:
  - home: index.md
  - getting started:
      - installation: getting-started/installation.md
      - quickstart: getting-started/quickstart.md
  - user guide:
      - basic usage: guide/basic-usage.md
      - transactions: guide/transactions.md
      - backends: guide/backends.md
      - fastapi integration: guide/fastapi.md
  - api reference:
      - database: api/database.md
      - backends: api/backends.md
      - errors: api/errors.md
